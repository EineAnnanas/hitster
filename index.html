<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Hitster Klassik</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#12101a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hitster Klassik">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #12101a; --panel: #1d1a2b; --panel2: #262238; --text: #f5f2ff; --muted: #9a92b5;
  --accent: #ff3e8a; --green: #1db954;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: radial-gradient(1200px 600px at 50% -10%, #2a1f4d 0%, var(--bg) 60%);
  color: var(--text); min-height: 100vh;
  padding-top: env(safe-area-inset-top);
}
.wrap { max-width: 640px; margin: 0 auto; padding: 16px 14px 60px; }
h1 { font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
h1 .neon { color: var(--accent); text-shadow: 0 0 18px rgba(255,62,138,.6); }
.card-panel { background: var(--panel); border-radius: 18px; padding: 18px; margin-top: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
label.lbl { display:block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 6px; }
input.tname {
  width: 100%; padding: 11px 12px; border-radius: 12px; border: 2px solid #3a3355; background: var(--panel2);
  color: var(--text); font-size: 15px; font-weight: 600; margin-bottom: 8px; outline: none;
}
input.tname:focus { border-color: var(--accent); }
.teamcount { display: flex; gap: 8px; }
.teamcount button { flex: 1; padding: 12px 0; border-radius: 12px; border: 2px solid #3a3355; background: var(--panel2); color: var(--text); font-size: 18px; font-weight: 800; cursor: pointer; }
.teamcount button.sel { border-color: var(--accent); background: #3a1f33; }
.dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
.trow { display: flex; align-items: center; gap: 8px; }
.bigbtn {
  display: block; width: 100%; margin-top: 14px; padding: 15px; border: none; border-radius: 16px; cursor: pointer;
  background: linear-gradient(135deg, #ff3e8a, #ff7a3e); color: #fff; font-size: 15px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase;
  box-shadow: 0 8px 24px rgba(255,62,138,.4); text-align: center; text-decoration: none;
}
.bigbtn:active { transform: scale(.98); }
.bigbtn.ghost { background: var(--panel2); box-shadow: none; border: 2px solid #3a3355; }
.bigbtn.green { background: var(--green); box-shadow: 0 8px 24px rgba(29,185,84,.35); }
.bigbtn:disabled { opacity: .4; }
.menu-btn { background: none; border: 2px solid #3a3355; color: var(--muted); border-radius: 10px; padding: 6px 12px; font-size: 12px; font-weight: 800; cursor: pointer; }

/* Home */
.mode { display: flex; align-items: center; gap: 14px; background: var(--panel); border-radius: 16px; padding: 16px; margin-top: 12px; cursor: pointer; border: 2px solid #2c2745; }
.mode:active { border-color: var(--accent); }
.mode .ic { width: 46px; height: 46px; border-radius: 12px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; color: #fff; }
.mode .tx b { display: block; font-size: 16px; }
.mode .tx span { font-size: 12.5px; color: var(--muted); line-height: 1.4; }
.spotify-chip { display: flex; align-items: center; gap: 8px; margin-top: 16px; padding: 12px 14px; border-radius: 14px; background: var(--panel); border: 2px solid #2c2745; font-size: 13px; font-weight: 700; cursor: pointer; }
.spotify-chip .st { width: 10px; height: 10px; border-radius: 50%; }
.spotify-chip .st.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
.spotify-chip .st.off { background: #666; }
.spotify-chip span.lbl2 { color: var(--muted); font-weight: 600; }

/* Game header */
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
.deckinfo { font-size: 12px; color: var(--muted); font-weight: 700; }
.lives { font-size: 14px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
.scores { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 4px; }
.score { flex: 1; min-width: 90px; background: var(--panel); border-radius: 14px; padding: 10px 12px; border: 2px solid transparent; }
.score.active { border-color: var(--tc); box-shadow: 0 0 16px color-mix(in srgb, var(--tc) 45%, transparent); }
.score .nm { font-size: 12px; font-weight: 800; color: var(--tc); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.score .pt { font-size: 22px; font-weight: 900; }
.score .pt small { font-size: 12px; color: var(--muted); font-weight: 700; }

/* Song card + Player */
.stage { margin-top: 14px; text-align: center; }
.turnlabel { font-size: 15px; font-weight: 800; margin-bottom: 10px; }
.turnlabel b { color: var(--tc); }
.songcard {
  position: relative; margin: 0 auto; width: min(340px, 90vw); border-radius: 22px; padding: 20px 16px 16px;
  background: linear-gradient(160deg, #2b2545, #1a1730); border: 2px solid #453d6b; box-shadow: 0 14px 40px rgba(0,0,0,.5);
}
.songcard.mystery { border-color: var(--accent); }
.eq { display: flex; justify-content: center; align-items: flex-end; gap: 5px; height: 54px; margin: 6px 0 2px; }
.eq i { width: 8px; background: var(--accent); border-radius: 4px; animation: eq 1s ease-in-out infinite; }
.eq i:nth-child(2){ animation-delay:.15s } .eq i:nth-child(3){ animation-delay:.3s }
.eq i:nth-child(4){ animation-delay:.45s } .eq i:nth-child(5){ animation-delay:.6s }
.eq.paused i { animation-play-state: paused; height: 10px !important; }
@keyframes eq { 0%,100%{height:12px} 50%{height:50px} }
.pctrl { display: flex; justify-content: center; gap: 10px; margin-top: 12px; }
.pctrl button {
  min-width: 56px; height: 48px; padding: 0 14px; border-radius: 14px; border: 2px solid #453d6b; background: var(--panel2);
  color: var(--text); font-size: 14px; font-weight: 800; cursor: pointer;
}
.pctrl button.main { background: var(--green); border-color: var(--green); color: #fff; min-width: 76px; font-size: 16px; }
.perr { margin-top: 10px; font-size: 12.5px; color: #ffb02e; line-height: 1.5; }
.qrbox { background: #fff; border-radius: 14px; padding: 12px; display: inline-block; }
.mysterytxt { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
.playlink { display: inline-block; margin-top: 10px; padding: 11px 20px; border-radius: 40px; background: var(--green); color: #fff; font-weight: 900; font-size: 14px; text-decoration: none; }
.reveal-year { font-size: 54px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
.reveal-title { font-size: 17px; font-weight: 800; margin-top: 8px; }
.reveal-comp { font-size: 14px; color: var(--muted); font-weight: 700; margin-top: 2px; }
.verdict { margin-top: 12px; font-size: 16px; font-weight: 900; padding: 10px; border-radius: 12px; }
.verdict.ok { background: #123d24; color: #4ade80; }
.verdict.bad { background: #43121d; color: #ff5c78; }

.fchips { display: flex; flex-wrap: wrap; gap: 6px; }
.fchip { border: 2px solid #3a3355; background: var(--panel2); color: var(--muted); border-radius: 20px;
  padding: 6px 11px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
.fchip.on { border-color: var(--accent); color: var(--text); background: #3a1f33; }
.fchip small { opacity: .6; font-size: 10.5px; }
.fchips-actions { display: flex; gap: 6px; margin-bottom: 8px; }
.tagline { margin-top: 6px; font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

/* Timeline */
.tl-section { margin-top: 16px; }
.tl-head { font-size: 13px; font-weight: 800; color: var(--tc); margin-bottom: 8px; display:flex; justify-content: space-between; }
.tl-head .cnt { color: var(--muted); font-weight: 700; }
.timeline { display: flex; align-items: center; gap: 6px; overflow-x: auto; padding: 10px 4px 14px; background: var(--panel); border-radius: 16px; border: 2px solid #2c2745; -webkit-overflow-scrolling: touch; }
.timeline.placing { border-color: var(--accent); }
.tlcard {
  flex: 0 0 auto; width: 88px; aspect-ratio: 1/1; border-radius: 12px; padding: 8px 6px; text-align: center;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: linear-gradient(160deg, var(--tc), color-mix(in srgb, var(--tc) 55%, #111)); color: #fff;
}
.tlcard .y { font-size: 19px; font-weight: 900; }
.tlcard .t { font-size: 9px; font-weight: 700; line-height: 1.2; margin-top: 3px; opacity: .92; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tlcard .c { font-size: 9px; font-weight: 800; margin-top: 2px; opacity: .75; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.tlcard.fresh { outline: 3px solid #fff; outline-offset: 2px; }
.tlcard.pending { background: repeating-linear-gradient(45deg, #3a3355, #3a3355 8px, #2c2745 8px, #2c2745 16px); }
.gap { flex: 0 0 auto; width: 34px; height: 88px; border-radius: 10px; border: 2px dashed #4a4270; background: transparent; color: var(--muted); font-size: 20px; font-weight: 900; cursor: pointer; }
.gap:active { border-color: var(--accent); color: var(--accent); }
.otherteams { margin-top: 14px; }
details.ot { background: var(--panel); border-radius: 14px; margin-bottom: 8px; border: 2px solid #2c2745; }
details.ot summary { padding: 10px 14px; font-size: 13px; font-weight: 800; color: var(--tc); cursor: pointer; list-style: none; display: flex; justify-content: space-between; }

.actions { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
.doubtrow { display: flex; gap: 8px; flex-wrap: wrap; }
.doubtrow button { flex: 1; min-width: 120px; padding: 12px; border-radius: 12px; border: 2px solid var(--tc); background: transparent; color: var(--tc); font-weight: 800; cursor: pointer; }
.hint { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.5; margin-top: 6px; }
.winner { text-align: center; padding: 26px 10px; }
.winner h2 { font-size: 26px; margin: 8px 0 4px; color: var(--tc); }
.sub { color: var(--muted); font-size: 13px; }
.bigscore { font-size: 64px; font-weight: 900; color: var(--accent); line-height: 1.1; }
.confetti { position: fixed; top: -14px; animation: fall linear forwards; z-index: 99; pointer-events: none; }
@keyframes fall { to { transform: translateY(105vh) rotate(720deg); } }
code.uri { display:block; background: var(--panel2); border-radius: 10px; padding: 10px; font-size: 12px; word-break: break-all; margin: 6px 0 2px; color: #8ec7ff; }
.setuplist { font-size: 13.5px; color: var(--muted); line-height: 1.7; margin-top: 8px; }
.setuplist b { color: var(--text); }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
"use strict";
/* ================= KONSTANTEN ================= */
const LS_GAME = "hk-v3-game", LS_BEST = "hk-pwa-best", LS_AUTH = "hk-pwa-auth", LS_CID = "hk-pwa-clientid", LS_FILT = "hk-v3-filt";
const SCOPES = "user-modify-playback-state user-read-playback-state";
const COLORS = ["#ff3e8a","#38d0ff","#a3e635","#ffb02e","#b78bff","#ff6a4d"];
const EPOCHS = ["Barock","Klassik","Romantik","Moderne","Zeitgenössisch"];

let SONGS = [];
let S = null;
let screen = 'home';
let playState = { playing: false, error: '' };

try { const s = localStorage.getItem(LS_GAME); if (s) S = JSON.parse(s); } catch(e){}
function save(){ try { localStorage.setItem(LS_GAME, JSON.stringify(S)); } catch(e){} }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const app = document.getElementById('app');
const $ = id => document.getElementById(id);
function skey(s){ return (s.t + '|' + s.c).toLowerCase(); }
function era(y){ return y < 1750 ? "Barock" : y < 1820 ? "Klassik" : y < 1900 ? "Romantik" : y < 1950 ? "Moderne" : "Zeitgenössisch"; }

/* ================= DATEN + FILTER ================= */
async function loadData(){
  try {
    const r = await fetch('songs.json?v=' + Date.now());
    SONGS = await r.json();
  } catch(e) { SONGS = []; }
}
function allComposers(){ return [...new Set(SONGS.map(s => s.c))].sort((a,b)=>a.localeCompare(b,'de')); }
function allGenres(){ return [...new Set(SONGS.map(s => s.g))].sort((a,b)=>a.localeCompare(b,'de')); }
// Filter: null = alle ausgewählt
let FILT = { c: null, g: null, e: null };
try { const f = JSON.parse(localStorage.getItem(LS_FILT)); if (f) FILT = f; } catch(e){}
function saveFilt(){ try { localStorage.setItem(LS_FILT, JSON.stringify(FILT)); } catch(e){} }
function filterMatch(s){
  if (FILT.c && !FILT.c.includes(s.c)) return false;
  if (FILT.g && !FILT.g.includes(s.g)) return false;
  if (FILT.e && !FILT.e.includes(era(s.y))) return false;
  return true;
}
function filteredSongs(){ return SONGS.filter(s => s.u && filterMatch(s)); }

/* ================= GITHUB entfernt – Songs kommen read-only aus songs.json ================= */

/* ================= SPOTIFY AUTH (PKCE) ================= */
function getAuth(){ try { return JSON.parse(localStorage.getItem(LS_AUTH)) || null; } catch(e){ return null; } }
function setAuth(a){ if (a) localStorage.setItem(LS_AUTH, JSON.stringify(a)); else localStorage.removeItem(LS_AUTH); }
function clientId(){ return localStorage.getItem(LS_CID) || ''; }
function redirectUri(){ return location.origin + location.pathname; }
function b64url(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
async function connectSpotify(){
  const cid = clientId();
  if (!cid) { alert('Bitte zuerst die Client-ID eintragen.'); return; }
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(48)));
  localStorage.setItem('hk-verifier', verifier);
  const challenge = b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
  const p = new URLSearchParams({ client_id: cid, response_type: 'code', redirect_uri: redirectUri(),
    scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge });
  location.href = 'https://accounts.spotify.com/authorize?' + p;
}
async function handleRedirect(){
  const code = new URLSearchParams(location.search).get('code');
  if (!code) return;
  const verifier = localStorage.getItem('hk-verifier');
  history.replaceState({}, '', location.pathname);
  if (!verifier) return;
  try {
    const r = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({ grant_type:'authorization_code', code, redirect_uri: redirectUri(),
        client_id: clientId(), code_verifier: verifier })
    });
    const j = await r.json();
    if (j.access_token) setAuth({ at: j.access_token, rt: j.refresh_token, exp: Date.now() + (j.expires_in-60)*1000 });
    else alert('Spotify-Login fehlgeschlagen: ' + (j.error_description || j.error || 'unbekannt'));
  } catch(e){ alert('Spotify-Login fehlgeschlagen (Netzwerk).'); }
}
async function token(){
  let a = getAuth();
  if (!a) return null;
  if (Date.now() < a.exp) return a.at;
  try {
    const r = await fetch('https://accounts.spotify.com/api/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({ grant_type:'refresh_token', refresh_token: a.rt, client_id: clientId() })
    });
    const j = await r.json();
    if (j.access_token) { a = { at: j.access_token, rt: j.refresh_token || a.rt, exp: Date.now() + (j.expires_in-60)*1000 }; setAuth(a); return a.at; }
  } catch(e){}
  setAuth(null); return null;
}
async function api(path, method, body){
  const t = await token();
  if (!t) throw { noAuth: true };
  const r = await fetch('https://api.spotify.com/v1' + path, {
    method: method || 'GET',
    headers: Object.assign({ 'Authorization': 'Bearer ' + t }, body ? {'Content-Type':'application/json'} : {}),
    body: body ? JSON.stringify(body) : undefined
  });
  if (r.status === 204 || r.status === 202) return {};
  let j = null; try { j = await r.json(); } catch(e){}
  if (!r.ok) throw { status: r.status, reason: j && j.error && (j.error.reason || j.error.message) };
  return j || {};
}
function connected(){ return !!getAuth(); }

/* ================= PLAYER (Spotify Connect) ================= */
function trackUri(url){ return 'spotify:track:' + url.split('/track/')[1].split('?')[0]; }
async function playUrl(u){
  playState.error = '';
  try {
    await api('/me/player/play', 'PUT', { uris: [trackUri(u)], position_ms: 0 });
    playState.playing = true;
  } catch(e) {
    if (e.noAuth) playState.error = 'Nicht mit Spotify verbunden.';
    else if (e.status === 404) {
      try {
        const d = await api('/me/player/devices');
        const dev = (d.devices || []).find(x => !x.is_restricted);
        if (dev) { await api('/me/player/play?device_id=' + dev.id, 'PUT', { uris: [trackUri(u)], position_ms: 0 }); playState.playing = true; }
        else playState.error = 'Kein Spotify-Gerät gefunden. Spotify-App kurz öffnen und etwas anspielen, dann erneut Play.';
      } catch(e2) { playState.error = 'Kein aktives Spotify-Gerät. Spotify-App kurz öffnen, dann erneut Play.'; }
    }
    else if (e.status === 403) playState.error = 'Playback-Steuerung braucht Spotify Premium.';
    else playState.error = 'Abspielen fehlgeschlagen – nochmal versuchen.';
  }
  render();
}
function playCurrent(){ return playUrl(S.current.u); }
async function pauseResume(){
  try {
    if (playState.playing) { await api('/me/player/pause','PUT'); playState.playing = false; }
    else { await api('/me/player/play','PUT'); playState.playing = true; }
  } catch(e){ playState.error = 'Steuerung fehlgeschlagen.'; }
  render();
}
async function skipFwd(){ try { const st = await api('/me/player'); const pos = (st && st.progress_ms) || 0; await api('/me/player/seek?position_ms=' + (pos + 20000), 'PUT'); } catch(e){} }
async function stopPlayback(){ try { await api('/me/player/pause','PUT'); } catch(e){} playState.playing = false; }

/* ================= NAV ================= */
function go(s){ screen = s; render(); }
function best(){ try { return parseInt(localStorage.getItem(LS_BEST)) || 0; } catch(e){ return 0; } }
function setBest(n){ try { localStorage.setItem(LS_BEST, n); } catch(e){} }
function shuffle(a){ for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ================= HOME ================= */
function renderHome(){
  const a = connected();
  const running = S && S.phase && S.phase !== 'gameover';
  app.innerHTML =
    '<h1>HITSTER <span class="neon">KLASSIK</span></h1>' +
    (running ? '<button class="bigbtn" onclick="go(\'game\')">Laufendes Spiel fortsetzen</button>' : '') +
    '<div class="mode" onclick="go(\'setup-endless\')"><div class="ic" style="background:linear-gradient(135deg,#ff3e8a,#ff7a3e)">∞</div>' +
      '<div class="tx"><b>Solo · Endlos</b><span>3 Leben, so weit wie möglich. Rekord: '+best()+' Karten</span></div></div>' +
    '<div class="mode" onclick="go(\'setup-classic\')"><div class="ic" style="background:linear-gradient(135deg,#38d0ff,#3877ff)">10</div>' +
      '<div class="tx"><b>Solo · Klassisch</b><span>Ziel-Kartenzahl erreichen</span></div></div>' +
    '<div class="mode" onclick="go(\'setup-party\')"><div class="ic" style="background:linear-gradient(135deg,#a3e635,#22b573)">2+</div>' +
      '<div class="tx"><b>Party</b><span>2–6 Teams an einem Gerät, mit Anzweifeln</span></div></div>' +
    '<div class="spotify-chip" onclick="go(\'settings\')"><div class="st '+(a?'on':'off')+'"></div>' +
      (a ? '<span>Spotify verbunden</span><span class="lbl2">– Songs starten automatisch</span>'
         : '<span>Spotify nicht verbunden</span><span class="lbl2">– einrichten für Auto-Playback</span>') + '</div>';
}

/* ================= FILTER-UI ================= */
function chip(dim, val, label, count){
  const arr = FILT[dim];
  const on = !arr || arr.includes(val);
  return '<button class="fchip '+(on?'on':'')+'" onclick="toggleFilt(\''+dim+'\',\''+esc(val).replace(/'/g,"\\'")+'\')">'+esc(label)+' <small>'+count+'</small></button>';
}
function filterSection(title, dim, values, counts){
  const arr = FILT[dim];
  const activeInfo = arr ? arr.length + ' von ' + values.length : 'alle';
  let h = '<details class="ot" style="--tc:#b78bff;margin-top:10px"'+(arr?' open':'')+'><summary><span>'+title+'</span><span>'+activeInfo+'</span></summary>' +
    '<div style="padding:8px 12px 12px">' +
    '<div class="fchips-actions"><button class="menu-btn" onclick="filtAll(\''+dim+'\')">Alle</button>' +
    '<button class="menu-btn" onclick="filtNone(\''+dim+'\')">Keine</button></div>' +
    '<div class="fchips">' + values.map(v => chip(dim, v, v, counts[v] || 0)).join('') + '</div></div></details>';
  return h;
}
function filterHtml(){
  const cc = {}, gc = {}, ec = {};
  for (const s of SONGS) { if (!s.u) continue; cc[s.c]=(cc[s.c]||0)+1; gc[s.g]=(gc[s.g]||0)+1; const e=era(s.y); ec[e]=(ec[e]||0)+1; }
  const n = filteredSongs().length;
  return '<label class="lbl">Kartenfilter</label>' +
    filterSection('Gattungen', 'g', allGenres(), gc) +
    filterSection('Epochen', 'e', EPOCHS.filter(e=>ec[e]), ec) +
    filterSection('Komponisten', 'c', allComposers(), cc) +
    '<p class="hint" style="margin-top:10px"><b style="color:var(--text)">'+n+' Karten</b> im Stapel</p>';
}
function toggleFilt(dim, val){
  const all = dim==='c' ? allComposers() : dim==='g' ? allGenres() : EPOCHS;
  let arr = FILT[dim] ? FILT[dim].slice() : all.slice();
  if (arr.includes(val)) arr = arr.filter(x => x !== val);
  else arr.push(val);
  FILT[dim] = (arr.length >= all.length) ? null : arr;
  saveFilt(); render();
}
function filtAll(dim){ FILT[dim] = null; saveFilt(); render(); }
function filtNone(dim){ FILT[dim] = []; saveFilt(); render(); }

/* ================= SETUP ================= */
function renderSetupEndless(){
  app.innerHTML = '<h1>Solo · <span class="neon">Endlos</span></h1><div class="card-panel">' + filterHtml() +
    '<button class="bigbtn" onclick="startEndless()">Los</button>' +
    '<button class="bigbtn ghost" onclick="go(\'home\')">Zurück</button></div>';
}
function renderSetupClassic(){
  app.innerHTML = '<h1>Solo · <span class="neon">Klassisch</span></h1><div class="card-panel">' + filterHtml() +
    '<label class="lbl">Karten zum Sieg</label>' +
    '<input class="tname" id="targetIn" type="number" min="1" max="60" value="10" style="max-width:120px">' +
    '<button class="bigbtn" onclick="startClassic()">Los</button>' +
    '<button class="bigbtn ghost" onclick="go(\'home\')">Zurück</button></div>';
}
let setupTeams = 3;
function renderSetupParty(){
  let names = '';
  for (let i = 0; i < setupTeams; i++) names += '<div class="trow"><span class="dot" style="background:'+COLORS[i]+'"></span>' +
    '<input class="tname" id="tn'+i+'" maxlength="18" value="Team '+(i+1)+'"></div>';
  app.innerHTML = '<h1>Party<span class="neon">-Modus</span></h1><div class="card-panel">' + filterHtml() +
    '<label class="lbl">Teams</label>' +
    '<div class="teamcount">' + [2,3,4,5,6].map(n => '<button class="'+(n===setupTeams?'sel':'')+'" onclick="setTeams('+n+')">'+n+'</button>').join('') + '</div>' +
    '<label class="lbl">Teamnamen</label>' + names +
    '<label class="lbl">Karten zum Sieg</label>' +
    '<input class="tname" id="targetIn" type="number" min="1" max="60" value="10" style="max-width:120px">' +
    '<button class="bigbtn" onclick="startParty()">Spiel starten</button>' +
    '<button class="bigbtn ghost" onclick="go(\'home\')">Zurück</button></div>';
}
function setTeams(n){ setupTeams = n; renderSetupParty(); }
function baseGame(teams, mode, target, lives){
  const pool = filteredSongs();
  if (pool.length < teams.length + 5) { alert('Der Filter lässt nur '+pool.length+' Karten übrig. Mindestens '+(teams.length+5)+' nötig – Filter lockern.'); return; }
  const deck = shuffle(pool.slice());
  for (const t of teams) t.cards.push(deck.pop());
  for (const t of teams) t.cards.sort((a,b)=>a.y-b.y);
  S = { mode, teams, deck, turn: 0, target, lives, phase: 'draw',
        current: null, placedAt: null, placingTeam: null, lastFresh: null, doubtedFrom: null };
  save(); screen = 'game'; render();
}
function startEndless(){
  if (S && S.phase && S.phase !== 'gameover' && !confirm('Laufendes Spiel verwerfen?')) return;
  baseGame([{ name:'Du', color: COLORS[0], cards: [] }], 'endless', null, 3);
}
function startClassic(){
  const t = Math.max(1, Math.min(60, parseInt($('targetIn').value) || 10));
  baseGame([{ name:'Du', color: COLORS[1], cards: [] }], 'classic', t, null);
}
function startParty(){
  const t = Math.max(1, Math.min(60, parseInt($('targetIn').value) || 10));
  const teams = [];
  for (let i = 0; i < setupTeams; i++) teams.push({ name: ($('tn'+i).value.trim()) || ('Team '+(i+1)), color: COLORS[i], cards: [] });
  baseGame(teams, 'party', t, null);
}

/* ================= SPIEL-RENDER ================= */
function render(){
  if (screen === 'home') { renderHome(); return; }
  if (screen === 'settings') { renderSettings(); return; }
  if (screen === 'setup-endless') { renderSetupEndless(); return; }
  if (screen === 'setup-classic') { renderSetupClassic(); return; }
  if (screen === 'setup-party') { renderSetupParty(); return; }
  if (!S || !S.phase) { renderHome(); return; }
  if (S.phase === 'gameover') { renderGameover(); return; }
  const solo = S.mode !== 'party';
  const T = S.teams[S.turn];
  const placer = S.placingTeam != null ? S.teams[S.placingTeam] : T;

  let html = '<div class="topbar"><h1 style="font-size:17px">HITSTER <span class="neon">KLASSIK</span></h1>' +
    '<div style="display:flex;gap:8px;align-items:center">' +
    (S.mode === 'endless' ? '<span class="lives">'+'♥'.repeat(S.lives)+'<span style="opacity:.25">'+'♥'.repeat(3-S.lives)+'</span></span>' : '') +
    '<span class="deckinfo">Stapel: '+S.deck.length+'</span>' +
    '<button class="menu-btn" onclick="quitGame()">Menü</button></div></div>';

  if (solo) {
    const t = S.teams[0];
    html += '<div class="scores"><div class="score active" style="--tc:'+t.color+'"><div class="nm">'+
      (S.mode==='endless' ? 'Karten (Rekord: '+best()+')' : 'Karten')+'</div><div class="pt">'+t.cards.length+
      (S.target ? '<small>/'+S.target+'</small>' : '')+'</div></div></div>';
  } else {
    html += '<div class="scores">' + S.teams.map((t,i) =>
      '<div class="score '+(i===S.turn?'active':'')+'" style="--tc:'+t.color+'"><div class="nm">'+esc(t.name)+'</div><div class="pt">'+t.cards.length+'<small>/'+S.target+'</small></div></div>').join('') + '</div>';
  }

  html += '<div class="stage" style="--tc:'+placer.color+'">';
  if (S.phase === 'draw') {
    html += (solo ? '' : '<div class="turnlabel"><b>'+esc(T.name)+'</b> ist dran</div>') +
      '<button class="bigbtn" style="max-width:320px;margin:10px auto" onclick="drawCard()">Karte ziehen'+(connected()?' – Song startet':'')+'</button>';
  }
  else if (S.phase === 'listen' || S.phase === 'placed' || S.phase === 'doubt-listen') {
    const song = S.current;
    const placing = (S.phase !== 'placed');
    html += '<div class="turnlabel"><b>'+esc(placer.name)+'</b>' + (S.phase==='doubt-listen' ? ' übernimmt die Karte' : (solo ? '' : ' – anhören und einordnen')) + '</div>';
    html += '<div class="songcard mystery">';
    if (connected()) {
      html += '<div class="eq '+(playState.playing?'':'paused')+'"><i></i><i></i><i></i><i></i><i></i></div>' +
        '<div class="pctrl">' +
          '<button class="main" onclick="'+(playState.playing?'pauseResume()':'playCurrent()')+'">'+(playState.playing?'❚❚':'▶')+'</button>' +
          '<button onclick="skipFwd()">+20s</button>' +
          '<button onclick="playCurrent()">Neu</button>' +
        '</div>' +
        (playState.error ? '<div class="perr">'+esc(playState.error)+'</div>' : '') +
        '<div class="mysterytxt">Läuft blind über deine Spotify-App.</div>';
    } else {
      html += '<div class="qrbox" id="qr"></div>' +
        '<div><a class="playlink" href="'+song.u+'" target="_blank" rel="noopener">In Spotify abspielen</a></div>' +
        '<div class="mysterytxt">Tipp: Spotify in den Einstellungen verbinden, dann starten Songs automatisch.</div>';
    }
    html += '</div>';
    if (placing) {
      html += '<p class="hint">Im Zeitstrahl auf eine Lücke (+) tippen.</p>';
      if (S.phase === 'listen') html += '<div class="actions"><button class="bigbtn ghost" onclick="skipSong()">Song überspringen</button></div>';
    }
    else html += '<div class="actions"><button class="bigbtn" onclick="reveal()">Aufdecken</button>' +
      '<button class="bigbtn ghost" onclick="unplace()">Position ändern</button></div>';
  }
  else if (S.phase === 'result') {
    const song = S.current;
    const ok = S.resultOk;
    html += '<div class="songcard"><div class="reveal-year" style="color:'+placer.color+'">'+song.y+'</div>' +
      '<div class="reveal-title">'+esc(song.t)+'</div><div class="reveal-comp">'+esc(song.c)+'</div>' +
      '<div class="tagline">'+esc(song.g)+' · '+era(song.y)+'</div>' +
      '<div class="verdict '+(ok?'ok':'bad')+'">'+(ok?'Richtig eingeordnet':'Leider falsch')+'</div></div>';
    html += '<div class="actions">';
    if (ok) {
      html += '<button class="bigbtn" onclick="keepCard()">Weiter</button>';
      if (!solo && S.doubtedFrom == null) {
        const others = S.teams.map((t,i)=>({t,i})).filter(x=>x.i!==S.turn);
        html += '<p class="hint">Anzweifler lag auch richtig? Karte abgeben:</p><div class="doubtrow">' +
          others.map(x => '<button style="border-color:'+x.t.color+';color:'+x.t.color+'" onclick="doubt('+x.i+')">→ '+esc(x.t.name)+'</button>').join('') + '</div>';
      }
    } else {
      html += '<button class="bigbtn ghost" onclick="discard()">'+(S.mode==='endless'?'Weiter (–1 Leben)':'Karte abwerfen')+'</button>';
      if (!solo && S.doubtedFrom == null) {
        const others = S.teams.map((t,i)=>({t,i})).filter(x=>x.i!==S.turn);
        html += '<p class="hint">Ein anderes Team darf die Karte in seinen Zeitstrahl einordnen:</p><div class="doubtrow">' +
          others.map(x => '<button style="border-color:'+x.t.color+';color:'+x.t.color+'" onclick="doubt('+x.i+')">'+esc(x.t.name)+' versucht es</button>').join('') + '</div>';
      }
    }
    html += '</div>';
  }
  html += '</div>';

  const showGaps = (S.phase === 'listen' || S.phase === 'doubt-listen');
  html += '<div class="tl-section" style="--tc:'+placer.color+'">' +
    '<div class="tl-head"><span>Zeitstrahl'+(solo?'':' · '+esc(placer.name))+'</span><span class="cnt">'+placer.cards.length+' Karten</span></div>' +
    renderTimeline(placer, showGaps, S.phase==='placed' ? S.placedAt : null) + '</div>';

  if (!solo) html += '<div class="otherteams">' + S.teams.map((t,i) => t === placer ? '' :
    '<details class="ot" style="--tc:'+t.color+'"><summary><span>'+esc(t.name)+'</span><span>'+t.cards.length+' Karten</span></summary>' +
    renderTimeline(t, false, null) + '</details>').join('') + '</div>';

  app.innerHTML = html;
  if (!connected() && (S.phase === 'listen' || S.phase === 'placed' || S.phase === 'doubt-listen')) {
    new QRCode($('qr'), { text: S.current.u, width: 150, height: 150, correctLevel: QRCode.CorrectLevel.M });
  }
}
function renderTimeline(team, withGaps, pendingIdx){
  let h = '<div class="timeline '+(withGaps?'placing':'')+'">';
  const cards = team.cards;
  if (withGaps) h += '<button class="gap" onclick="place(0)">+</button>';
  for (let i = 0; i < cards.length; i++) {
    if (pendingIdx === i) h += '<div class="tlcard pending"><div class="y">?</div></div>';
    const s = cards[i];
    h += '<div class="tlcard '+(S.lastFresh===skey(s)?'fresh':'')+'"><div class="y">'+s.y+'</div><div class="t">'+esc(s.t)+'</div><div class="c">'+esc(s.c)+'</div></div>';
    if (withGaps) h += '<button class="gap" onclick="place('+(i+1)+')">+</button>';
  }
  if (pendingIdx === cards.length) h += '<div class="tlcard pending"><div class="y">?</div></div>';
  return h + '</div>';
}

/* ================= AKTIONEN ================= */
function drawCard(){
  if (!S.deck.length) { endGame(null); return; }
  S.current = S.deck.pop();
  S.placingTeam = S.turn;
  S.doubtedFrom = null;
  S.phase = 'listen';
  save(); render();
  if (connected()) playCurrent();
}
function skipSong(){
  if (!S.deck.length) { playState.error = 'Stapel ist leer – kein Skip mehr möglich.'; render(); return; }
  S.current = S.deck.pop();
  S.placedAt = null;
  S.phase = 'listen';
  playState.playing = false; playState.error = '';
  save(); render();
  if (connected()) playCurrent();
}
function place(idx){ S.placedAt = idx; S.phase = 'placed'; save(); render(); }
function unplace(){ S.placedAt = null; S.phase = S.doubtedFrom == null ? 'listen' : 'doubt-listen'; save(); render(); }
function reveal(){
  const team = S.teams[S.placingTeam];
  const y = S.current.y;
  const prev = S.placedAt > 0 ? team.cards[S.placedAt-1].y : -Infinity;
  const next = S.placedAt < team.cards.length ? team.cards[S.placedAt].y : Infinity;
  S.resultOk = (y >= prev && y <= next);
  S.phase = 'result';
  save(); render();
}
function keepCard(){
  const team = S.teams[S.placingTeam];
  team.cards.splice(S.placedAt, 0, S.current);
  S.lastFresh = skey(S.current);
  if (S.target && team.cards.length >= S.target) { endGame(S.placingTeam); return; }
  nextTurn();
}
function discard(){
  if (S.mode === 'endless') {
    S.lives--;
    if (S.lives <= 0) { endGame(0); return; }
  }
  nextTurn();
}
function doubt(i){ S.doubtedFrom = S.placingTeam; S.placingTeam = i; S.placedAt = null; S.phase = 'doubt-listen'; save(); render(); }
function nextTurn(){
  stopPlayback();
  S.current = null; S.placedAt = null; S.placingTeam = null; S.doubtedFrom = null;
  S.turn = (S.turn + 1) % S.teams.length;
  S.phase = 'draw';
  save(); render();
}
function endGame(winnerIdx){
  stopPlayback();
  S.phase = 'gameover';
  S.winnerIdx = winnerIdx;
  if (S.mode === 'endless') {
    S.finalScore = Math.max(0, S.teams[0].cards.length - 1);
    if (S.finalScore > best()) { setBest(S.finalScore); S.newBest = true; }
  }
  save(); render();
}
function renderGameover(){
  let html;
  if (S.mode === 'endless') {
    html = '<div class="winner" style="--tc:'+COLORS[0]+'"><h2>Vorbei!</h2>' +
      '<div class="bigscore">'+S.finalScore+'</div><div class="sub">Karten richtig eingeordnet' +
      (S.newBest ? ' – Neuer Rekord!' : ' · Rekord: '+best()) + '</div>' +
      '<div class="tl-section" style="--tc:'+COLORS[0]+'">'+renderTimeline(S.teams[0],false,null)+'</div>' +
      '<button class="bigbtn" onclick="startEndless()">Nochmal</button>' +
      '<button class="bigbtn ghost" onclick="quitToHome()">Menü</button></div>';
  } else {
    const w = S.teams[S.winnerIdx != null ? S.winnerIdx : 0];
    html = '<div class="winner" style="--tc:'+w.color+'"><h2>'+esc(w.name)+' gewinnt!</h2>' +
      '<div class="sub">'+w.cards.length+' Karten im Zeitstrahl</div>' +
      '<div class="tl-section" style="--tc:'+w.color+'">'+renderTimeline(w,false,null)+'</div>' +
      '<button class="bigbtn" onclick="quitToHome()">Menü</button></div>';
  }
  app.innerHTML = html;
  if (S.mode !== 'endless' || S.newBest) {
    for (let i=0;i<50;i++){
      const c = document.createElement('div'); c.className='confetti';
      c.style.background = COLORS[i % COLORS.length];
      c.style.width='8px'; c.style.height='14px'; c.style.borderRadius='2px';
      c.style.left = Math.random()*100+'vw';
      c.style.animationDuration = (2.5+Math.random()*2)+'s';
      c.style.animationDelay = (Math.random()*1.5)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 6000);
    }
  }
}
function quitGame(){ if (confirm('Zurück ins Menü? Das Spiel bleibt gespeichert.')) { stopPlayback(); go('home'); } }
function quitToHome(){ S = null; try { localStorage.removeItem(LS_GAME); } catch(e){} go('home'); }

/* ================= EINSTELLUNGEN ================= */
function renderSettings(){
  const a = connected();
  app.innerHTML = '<h1>Spotify<span class="neon"> verbinden</span></h1>' +
    '<div class="card-panel">' +
    (a ? '<p class="setuplist"><b>Verbunden.</b> Songs starten automatisch über deine Spotify-App (Premium nötig). Falls nichts spielt: Spotify-App einmal öffnen und kurz irgendwas anspielen.</p>' +
         '<button class="bigbtn ghost" onclick="disconnect()">Verbindung trennen</button>'
       : '<p class="setuplist">Einmaliges Setup (Spotify Premium nötig):<br>' +
         '<b>1.</b> Auf <b>developer.spotify.com/dashboard</b> eine App anlegen.<br>' +
         '<b>2.</b> Als <b>Redirect URI</b> exakt diese Adresse eintragen:</p>' +
         '<code class="uri">'+esc(redirectUri())+'</code>' +
         '<p class="setuplist"><b>3.</b> Die <b>Client ID</b> hier einfügen:</p>' +
         '<input class="tname" id="cid" placeholder="Client ID" value="'+esc(clientId())+'">' +
         '<button class="bigbtn green" onclick="saveCidAndConnect()">Mit Spotify verbinden</button>') +
    '<button class="bigbtn ghost" onclick="go(\'home\')">Zurück</button></div>' +
    '<p class="hint">Ohne Verbindung funktioniert das Spiel trotzdem – dann mit QR-Code und Spotify-Link.</p>';
}
function saveCidAndConnect(){
  const v = $('cid').value.trim();
  if (!v) { alert('Bitte Client ID einfügen.'); return; }
  localStorage.setItem(LS_CID, v);
  connectSpotify();
}
function disconnect(){ setAuth(null); render(); }

/* ================= START ================= */
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }
app.innerHTML = '<h1>HITSTER <span class="neon">KLASSIK</span></h1><p class="hint" style="text-align:left;margin-top:14px">Lade Karten…</p>';
handleRedirect().then(loadData).then(() => {
  if (S && S.phase && S.phase !== 'gameover') screen = 'game';
  render();
});

</script>
</body>
